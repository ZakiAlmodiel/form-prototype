<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FormFlow – Submitted!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="screen active" id="screen-success">
    <div class="success-wrap">
      <div class="success-card">

        <div class="success-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>

        <h2 class="success-title">Submitted!</h2>

        <p class="success-msg">
          Thank you for completing the form. Your responses have been recorded and will help us design a better form experience.
        </p>

        <div class="success-summary">
          <div class="summary-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Submitted on <strong id="submit-date"></strong>
          </div>
          <div class="summary-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Response from <strong id="submit-name"></strong>
          </div>
          <div class="summary-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            All 4 sections completed
          </div>
        </div>

        <div class="success-note">
          A confirmation has been noted. You may close this window.
        </div>

        <a href="index.html" class="btn-primary">Fill Out Another Form</a>

      </div>
      <div class="deco-circle deco-1"></div>
      <div class="deco-circle deco-3"></div>
    </div>
  </div>

  <script>
    // Show submit date and name from localStorage
    const now = new Date();
    document.getElementById('submit-date').textContent = now.toLocaleDateString('en-PH', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    const name = localStorage.getItem('ff_fullname');
    document.getElementById('submit-name').textContent = (name && name.trim() !== '') ? name : 'respondent';
  </script>

</body>
</html>
