<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FormFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="screen active" id="screen-landing">
    <div class="landing-grid">
      <div class="landing-left">
        <div class="brand-tag">FormFlow</div>
        <h1 class="landing-title">Fill out forms<br /><em>the right way.</em></h1>
        <p class="landing-subtitle">
          A smarter, calmer form experience — built around how people actually think and work.
        </p>
        <div class="meta-row">
          <div class="meta-chip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Est. 5 minutes
          </div>
          <div class="meta-chip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Auto-saved
          </div>
          <div class="meta-chip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secure
          </div>
        </div>
        <a href="personal.html" class="btn-primary">
          Begin Form
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
      <div class="landing-right">
        <div class="preview-card">
          <div class="preview-header">
            <div class="preview-dots">
              <span></span><span></span><span></span>
            </div>
            <span class="preview-label">Student Registration</span>
          </div>
          <div class="preview-field">
            <div class="preview-field-label">Full Name</div>
            <div class="preview-field-bar filled"></div>
          </div>
          <div class="preview-field">
            <div class="preview-field-label">Course</div>
            <div class="preview-field-bar filled short"></div>
          </div>
          <div class="preview-field">
            <div class="preview-field-label">Year Level</div>
            <div class="preview-field-bar semi"></div>
          </div>
          <div class="preview-progress">
            <div class="preview-progress-label">
              <span>Progress</span><span>60%</span>
            </div>
            <div class="preview-progress-track">
              <div class="preview-progress-fill"></div>
            </div>
          </div>
          <div class="preview-tag">✓ Auto-filled from profile</div>
        </div>
        <div class="deco-circle deco-1"></div>
        <div class="deco-circle deco-2"></div>
      </div>
    </div>
  </div>

</body>
</html>
